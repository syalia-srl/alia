<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="assets/highlight-theme.css">
  <style>
    :root {
      --bg: #111317; --panel: #1b1e26; --panel2: #21252f;
      --text: #e8e8ec; --muted: #8b90a0; --accent: #9b7dff; --cmd: #ffd28a;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, "Inter", "Cantarell", system-ui, sans-serif;
      font-size: 14px; line-height: 1.55;
    }
    #log { padding: 14px 16px 20px; }
    .msg { margin: 0 0 14px; }
    .role { font-size: 11px; font-weight: 700; letter-spacing: .06em;
            text-transform: uppercase; margin-bottom: 3px; }
    .msg.user .role { color: var(--muted); }
    .msg.alia .role { color: var(--accent); }
    .bubble.user { color: #cfd3dd; white-space: pre-wrap; }
    .bubble.alia > *:first-child { margin-top: 0; }
    .bubble.alia > *:last-child { margin-bottom: 0; }
    .bubble.alia p { margin: .5em 0; }
    .bubble.alia h1,.bubble.alia h2,.bubble.alia h3 { margin: .8em 0 .3em; line-height: 1.25; }
    .bubble.alia code { background: var(--panel2); padding: .12em .35em;
                        border-radius: 5px; font-size: .92em; }
    .bubble.alia pre { background: #0d0f13; border: 1px solid #2a2f3a;
                       border-radius: 10px; padding: 12px; overflow-x: auto; }
    .bubble.alia pre code { background: none; padding: 0; }
    .bubble.alia ul,.bubble.alia ol { margin: .4em 0; padding-left: 1.3em; }
    .bubble.alia a { color: var(--accent); }
    .bubble.alia blockquote { border-left: 3px solid var(--accent);
                              margin: .5em 0; padding-left: .8em; color: var(--muted); }
    .tool { font-family: ui-monospace, "JetBrains Mono", monospace;
            font-size: 12.5px; background: var(--panel); border: 1px solid #262b35;
            border-radius: 8px; padding: 7px 10px; margin: 6px 0; color: var(--muted); }
    .tool .cmd { color: var(--cmd); }
    .tool.done { border-color: #2f5d3a; }
    .tool.failed { border-color: #6b2f2f; color: #e0a3a3; }
    #spinner { display: none; align-items: center; gap: 9px; color: var(--muted);
               font-size: 13px; padding: 4px 2px 10px; }
    #spinner.on { display: flex; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent);
           animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: .35; transform: scale(.8);} 50% { opacity: 1; transform: scale(1.1);} }
  </style>
</head>
<body>
  <div id="log"></div>
  <div id="spinner"><span class="dot"></span><span id="spinner-text">ALIA está pensando…</span></div>
  <script src="assets/marked.min.js"></script>
  <script src="assets/highlight.min.js"></script>
  <script>
    const log = document.getElementById('log');
    const spinner = document.getElementById('spinner');
    const spinnerText = document.getElementById('spinner-text');

    function scrollEnd() { window.scrollTo(0, document.body.scrollHeight); }

    function aliaAddUser(text) {
      const el = document.createElement('div');
      el.className = 'msg user';
      const r = document.createElement('div'); r.className = 'role'; r.textContent = 'Tú';
      const b = document.createElement('div'); b.className = 'bubble user'; b.textContent = text;
      el.appendChild(r); el.appendChild(b); log.appendChild(el); scrollEnd();
    }

    function aliaAddAssistant(md) {
      const el = document.createElement('div');
      el.className = 'msg alia';
      const r = document.createElement('div'); r.className = 'role'; r.textContent = 'ALIA';
      const b = document.createElement('div'); b.className = 'bubble alia';
      try { b.innerHTML = marked.parse(md || ''); } catch (e) { b.textContent = md || ''; }
      b.querySelectorAll('pre code').forEach(c => { try { hljs.highlightElement(c); } catch (e) {} });
      el.appendChild(r); el.appendChild(b); log.appendChild(el); scrollEnd();
    }

    function aliaAddTool(title, detail, status) {
      const el = document.createElement('div');
      el.className = 'tool' + (status ? ' ' + status : '');
      const icon = status === 'done' ? '✓ ' : status === 'failed' ? '✗ ' : '→ ';
      el.innerHTML = icon + title + (detail ? ': <span class="cmd"></span>' : '');
      if (detail) el.querySelector('.cmd').textContent = detail;
      log.appendChild(el); scrollEnd();
    }

    function aliaSetBusy(on, text) {
      spinner.classList.toggle('on', !!on);
      if (text) spinnerText.textContent = text;
      if (on) scrollEnd();
    }
  </script>
</body>
</html>
